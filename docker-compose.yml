services:
  study-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-mistral-small-latest}
      - APP_PASSWORD=${APP_PASSWORD}
      - PORT=3000
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
