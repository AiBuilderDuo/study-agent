services:
  study-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5}
      - APP_PASSWORD=${APP_PASSWORD}
      - PORT=3000
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
