services:
  study-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - APP_PASSWORD=${APP_PASSWORD}
      - PORT=3000
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
